apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: nova-backend-static-secret
spec:
  refreshAfter: 30s
  # path of the secret
  path: applications/nova/backend
  type: kv-v2
  mount: k8-cluster
  destination:
    # destination k8s secret
    name: nova-backend-secrets
    create: true
  vaultAuthRef: nova-backend-vault-auth

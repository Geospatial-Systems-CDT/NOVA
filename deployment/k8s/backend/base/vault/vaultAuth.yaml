apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: nova-backend-vault-auth
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: nova-backend-role
    serviceAccount: nova-backend-sa
    audiences:
      - vault

resources:
  - ../../base

namespace: nova

patches:
  - path: patches/virtualService.yaml
    target:
      kind: VirtualService
  - path: patches/gateway.yaml
    target:
      kind: Gateway
  - path: patches/request-authentication.yaml
    target:
      kind: RequestAuthentication
      name: cognito-authentication-request

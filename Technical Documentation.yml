site_name: Technical Documentation
site_description: Technical documentation for the NOVA platform
docs_dir: docs
site_dir: site

theme:
  name: mkdocs

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js
  - javascripts/katex.js

nav:
  - Home: index.md
  - System Architecture and Components: system-architecture.md
  - System Overview:
      - User Guide: user-guide/estimated-output-mvp-method.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
